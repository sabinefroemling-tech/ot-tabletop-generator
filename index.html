<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Interaktives OT-Security-Werkzeug: generiert vollständige Tabletop-Übungen mit Drehbuch, Einspielungen, Beobachterbogen und Debrief-Leitfaden. Läuft vollständig lokal im Browser.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a33'/%3E%3Cpath d='M14 44 32 18l20 26z' fill='none' stroke='%237a5cff' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='18' r='4' fill='%2341cdf4'/%3E%3Ccircle cx='14' cy='44' r='4' fill='%23d6246e'/%3E%3Ccircle cx='52' cy='44' r='4' fill='%232fe39b'/%3E%3C/svg%3E">
<title>OT-Tabletop-Übungsgenerator · Companion zum Buch</title>
<style>
/* Lokale Schriften — kein Abruf bei Google Fonts (vgl. LG München I, 3 O 17493/20) · SIL OFL 1.1 */
@font-face{font-family:'Fraunces';src:url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2-variations'),url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap;}
@font-face{font-family:'JetBrains Mono';src:url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2-variations'),url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2');font-weight:100 800;font-style:normal;font-display:swap;}
:root{--red:#2240c4;--red-soft:#dfe4fa;--ink:#181840;--paper:#f5f6fb;--line:#d8dcef;--muted:#5d6184;
--ok:#1d8a5f;--teil:#b97e0a;--offen:#d6246e;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:var(--paper);color:var(--ink);line-height:1.5;
background-image:radial-gradient(var(--line) .5px,transparent .5px);background-size:22px 22px;}
.wrap{max-width:1180px;margin:0 auto;padding:38px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:18px;}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;}
h1{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(24px,4.2vw,40px);line-height:1.05;margin:8px 0 10px;}
.sub{font-size:13px;color:var(--muted);max-width:880px;}
.sig{color:var(--red);font-weight:600;}
.ref{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;}
h2{font-family:'Fraunces',serif;font-size:20px;margin:26px 0 6px;}
.note{font-size:12px;color:var(--muted);margin-bottom:10px;max-width:880px;}
details{margin:12px 0;background:#fff;border:1px solid var(--line);padding:10px 14px;}
summary{cursor:pointer;font-weight:600;font-size:12px;}
details p,details li{font-size:11.5px;color:var(--muted);margin-top:6px;}
details ul{margin-left:18px;}
.btn{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
padding:10px 15px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;transition:.15s;}
.btn.ghost{background:transparent;color:var(--ink);} .btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:24px 0 0;align-items:center;}
.warn{background:#fff7e6;border:1px solid #b97e0a;color:#7a5306;font-size:11.5px;padding:9px 12px;margin:10px 0;}
footer{margin-top:34px;border-top:1px solid var(--line);padding-top:15px;font-size:11px;color:var(--muted);line-height:1.7;}

/* Bestandsaufnahme */
.werkbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--ink);padding:10px 14px;margin:12px 0;}
.werkbar label{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.werkbar input{border:1px solid var(--line);background:var(--paper);font-family:inherit;font-size:12px;padding:4px 6px;}
.werkbar input.w{min-width:240px;}
.q{background:#fff;border:1px solid var(--line);padding:10px 14px;margin:9px 0;}
.q .qt{font-size:12px;font-weight:600;margin-bottom:7px;}
.q .qt b{color:var(--red);}
.opts{display:flex;flex-wrap:wrap;gap:6px;}
.opt{font-size:11.5px;padding:5px 10px;border:1px solid var(--line);background:var(--paper);cursor:pointer;border-radius:2px;}
.opt:hover{border-color:var(--ink);}
.opt.sel{background:var(--ink);color:#fff;border-color:var(--ink);}

/* Fahrplan */
.headline{background:var(--ink);color:#fff;padding:12px 16px;margin-top:8px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;}
.headline .t{font-family:'Fraunces',serif;font-weight:800;font-size:18px;}
.headline .next{font-size:11px;color:var(--red-soft);}
.stage{background:#fff;border:1px solid var(--ink);border-top:0;}
.stage:first-of-type{border-top:1px solid var(--ink);}
.stagehead{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.stagehead .sn{font-family:'Fraunces',serif;font-weight:800;font-size:15px;}
.stagehead .st{font-weight:600;font-size:13px;flex:1;min-width:150px;}
.pill{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#fff;padding:3px 9px;}
.stagebody{padding:10px 14px;}
.gap{font-size:11.5px;margin-bottom:9px;}
.gap b{color:var(--red);}
.tmpl{background:var(--paper);border:1px solid var(--line);margin-top:8px;}
.tmplhead{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:7px 11px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px;}
.tmplbody{padding:10px 12px;font-size:11.5px;}
.tmplbody ul{margin-left:17px;}
.tmplbody li{margin:3px 0;}
.tmplbody pre{white-space:pre-wrap;font-family:inherit;font-size:11px;line-height:1.55;}
.copybtn,.csvbtn{font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:4px 9px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;}
.copybtn:hover,.csvbtn:hover{background:var(--ink);color:#fff;}
.legalbox{border:1px solid var(--teil);background:#fff7e6;padding:9px 12px;margin-top:8px;font-size:11.5px;color:#7a5306;}
.legalbox b{color:#7a5306;}
.disc{font-size:10.5px;color:var(--muted);font-style:italic;margin-top:7px;}
.audit{font-size:11px;color:var(--muted);}
.audit td{border:1px solid var(--line);padding:4px 7px;}
.audit table{border-collapse:collapse;width:100%;background:#fff;margin-top:5px;}
.audit th{background:var(--ink);color:#fff;font-size:10px;padding:4px 7px;text-align:left;}

.print-only{display:none;}
@media print{
  body{background:none;}
  .wrap{padding:0;max-width:none;}
  .noprint{display:none!important;}
  .print-only{display:block;}
  .tmpl,.stage,.q{break-inside:avoid;}
  @page{margin:14mm;}
}
.langsw{position:absolute;top:0;right:0;display:flex;border:1px solid var(--ink);}
.langsw button{font-family:inherit;font-size:11px;font-weight:600;padding:5px 11px;border:0;background:transparent;color:var(--ink);cursor:pointer;letter-spacing:1px;}
.langsw button.on{background:var(--ink);color:#fff;}
@media print{.langsw{display:none}}
body.printobs .wrap>*{display:none!important}
body.printobs #out{display:block!important}
body.printobs #out>*{display:none!important}
body.printobs #out #obsheet{display:block!important}
@media print{body.printobs .print-only{display:none!important}}

/* ================= Reihen-Design v2 (Buchcover) ================= */
header.sf-cover{position:relative;overflow:hidden;background:#0a0a33;border-bottom:0;padding:0;margin:0;}
.sf-cover svg.plx{position:absolute;inset:0;width:100%;height:100%;}
.sf-cover-in{position:relative;max-width:1180px;margin:0 auto;padding:46px 20px 34px;}
.sf-cover .kicker{color:#41cdf4;}
.sf-cover h1{color:#fff;text-shadow:0 1px 14px rgba(6,6,31,.55);}
.sf-cover .sub{color:#ccd1f2;}
.sf-cover .sig{color:#ff5fa8;}
.sf-cover .ref{color:#9aa0d6;}
.sf-cover .langsw{position:absolute;top:18px;right:20px;border:1px solid rgba(232,234,255,.45);}
.sf-cover .langsw button{color:#e8eaff;}
.sf-cover .langsw button.on{background:#e8eaff;color:#10104a;}
.sf-rule{height:4px;background:linear-gradient(90deg,#d6246e,#7a5cff 35%,#41cdf4 72%,#2fe39b);}
.wrap{padding-top:26px;}
.sf-glance{background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);padding:16px 18px 8px;margin:6px 0 20px;}
.sf-glh{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:8px;}
.sf-glg{display:grid;grid-template-columns:1fr;margin:0;}
.sf-glg>div{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:7px 0;border-top:1px dashed var(--line);}
.sf-glg>div:first-child{border-top:0;}
.sf-glg dt{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;padding-top:2px;}
.sf-glg dd{font-size:12.5px;margin:0;line-height:1.55;}
.sf-legal{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:10.5px;color:var(--muted);line-height:1.65;max-width:980px;}
.sf-legal a{color:var(--muted);}
.sf-footband{position:relative;overflow:hidden;background:#0a0a33;margin-top:42px;}
.sf-footband svg.plx{position:absolute;inset:0;width:100%;height:100%;opacity:.9;}
.sf-foot-in{position:relative;max-width:1180px;margin:0 auto;padding:26px 20px 30px;}
.sf-foot-in footer{margin:0;border:0;padding:0;font-size:11px;color:#c7cbee;line-height:1.7;}
.sf-foot-in footer b{color:#fff;}
.sf-foot-in footer a{color:#9fd9f6;}
.sf-colo{margin-top:14px;padding-top:12px;border-top:1px solid rgba(199,203,238,.28);font-size:10.5px;color:#9aa0d6;line-height:1.9;}
.sf-colo a{color:#c7cbee;}
.sf-printhead{display:none;}
@keyframes sfPulse{0%,100%{opacity:.55}50%{opacity:1}}
.plx .ndp{animation:sfPulse 5s ease-in-out infinite;}
@media (prefers-reduced-motion:reduce){.plx .ndp{animation:none;}}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
@media print{
 .noprint,header.sf-cover,.sf-rule,.sf-glance,.sf-legal,.sf-footband{display:none!important}
 .sf-printhead{display:block;text-align:center;font-size:10px;color:#000;margin-bottom:6px;}
}
@media (max-width:620px){
 .sf-cover-in{padding:40px 16px 26px;}
 .sf-glg>div{grid-template-columns:1fr;gap:2px;}
 .sf-cover .langsw{top:12px;right:12px;}
}
</style>

 dsum:"Aufbau, Spielregeln & Audit-Verwertung (lesen)",
 dbody:"<p><b>Aufbau (Kap. 8.4.1):</b> Vorbereitung (zwei bis vier Wochen vorher: Ziel, Szenario, Rollen, Raum) → Briefing (15 Min: Spielregeln, Übungsziel, Rolle der Spielleitung) → Szenario-Start (5 Min: erstes Lagebild) → Spielphasen (Eskalationsstufen mit neuen Informationen und Entscheidungsbedarf; Lage-Update alle 20–30 Min) → Abschluss-Lagebild → Debriefing.</p><p><b>Spielregeln:</b> Keine echte Systemberührung — alles wird gesprochen und dokumentiert, nichts wird geklickt. Jede simulierte Kommunikation trägt die Kennzeichnung „ÜBUNG\u201c. Die Übung ist kein Bewertungsinstrument für Einzelpersonen (Just-Culture-Prinzip, Kap. 7.3); bewertet werden Prozesse, nicht Menschen. Die Spielleitung darf Einspielungen vorziehen, wenn eine Diskussion stockt.</p><p><b>Teilnehmende sind die echten Rollen:</b> Es übt, wer im Ernstfall entscheidet — nicht deren Vertretung der Vertretung. Für Führungskräfte und Werksleiter empfiehlt das Buch das 90-Minuten-Format mit realistischem Szenario, jährlich (Kap. 7.2).</p><p><b>Audit-Verwertung (Kap. 17.4):</b> Der Tabletop-Test ist Stufe 4 des fünfstufigen OT-Audit-Modells — die wahrscheinlich aufschlussreichste. Dokumentierte Durchführung, Beobachterbogen und Maßnahmenliste sind verwertbare Nachweise für ISO/IEC 27001 (Controls 5.24–5.27) und die Bewältigung von Sicherheitsvorfällen nach §30 Abs. 2 BSIG.</p>",

 ref:"Methodology per \u201cIndustrial ISMS for OT Environments\u201d, ch. 15.4 (tabletop exercises; template T-12 in ch. 30), 15.8 (OT incident triage & early warning, §32 BSIG — German NIS2 transposition), 14 (no-touch register) and 22.4 (tabletop as audit stage 4).",
 dsum:"Structure, ground rules & audit use (read me)",
 dbody:"<p><b>Structure (ch. 15.4):</b> preparation (two to four weeks ahead: objective, scenario, roles, room) → briefing (15 min: ground rules, exercise objective, role of the facilitator) → scenario start (5 min: first situation picture) → play phases (escalation stages with new information and decisions to make; situation update every 20–30 min) → final situation picture → debriefing.</p><p><b>Ground rules:</b> no touching of real systems — everything is spoken and documented, nothing is clicked. Every simulated communication is labelled \u201cEXERCISE\u201d. The exercise is not an assessment instrument for individuals (just-culture principle, ch. 6.3); processes are assessed, not people. The facilitator may bring an inject forward when a discussion stalls.</p><p><b>Participants are the real roles:</b> whoever decides in a real incident exercises — not their deputy's deputy. For executives and plant managers, the book recommends the 90-minute format with a realistic scenario, annually (ch. 6.2).</p><p><b>Audit use (ch. 22.4):</b> the tabletop test is stage 4 of the five-stage OT audit model — probably the most revealing one. Documented execution, observer sheet and action list are usable evidence for ISO/IEC 27001 (controls 5.24–5.27) and incident handling under §30(2) BSIG.</p>",

 sfGlance:"<div class='sf-glh'>At a glance</div><dl class='sf-glg'><div><dt>Purpose</dt><dd>Generates a complete OT tabletop exercise in minutes — the cheapest test of whether your incident process holds, with zero impact on running plants.</dd></div><div><dt>How to use</dt><dd>Configure scenario, sector, roles and difficulty; the script is generated automatically and stays editable at any time. Save states as JSON.</dd></div><div><dt>Result</dt><dd>A facilitator script with timeline, injects, observer sheet, debrief guide and a spoiler-free invitation — print-ready.</dd></div></dl>",
 sfLegal:"<b>Usage notes (disclaimer).</b> This tool is a methodical working aid for self-assessment and documentation. It replaces neither individual security or legal advice, nor a risk analysis, nor on-site technical verification. References to standards are for orientation and are not a statement of conformity. Results are based solely on your own input; all information is provided without warranty. Use is at your own responsibility; liability for accuracy, completeness, currency and fitness for a particular purpose is — to the extent legally permissible — excluded.",
 sfColo:"© Sabine Frömling · <a href='https://creativecommons.org/licenses/by-nc-nd/4.0/deed.en' rel='license'>CC BY-NC-ND 4.0</a> · Companion series: <a href='https://sabinefroemling-tech.github.io/crown-jewels-companion/?lang=en'>Crown Jewels</a> · <a href='https://sabinefroemling-tech.github.io/no-touch-register/?lang=en'>No-Touch Register</a> · <a href='https://sabinefroemling-tech.github.io/jit-fernwartung-fahrplan/?lang=en'>JIT Remote-Maintenance Roadmap</a> · <a href='https://sabinefroemling-tech.github.io/ot-remote-access-compass/?lang=en'>Remote-Access Compass</a> · <a href='https://sabinefroemling-tech.github.io/island-mode-72h-stresstest/?lang=en'>Island-Mode 72h Stress Test</a>",
 foot:"Methodology per \u201cIndustrial ISMS for OT Environments\u201d, ch. 15.4. A tabletop exercise simulates the incident through a facilitator and escalation stages — participants are the real crisis-team roles and react in real time. The generated content is a drafting aid for exercise preparation, not legal advice; the value of the exercise lies in the debriefing and the resulting actions, not in the document. German edition: „ISMS für die Industrie – Der Praxisratgeber“ (Springer Vieweg, 2026).<br><span class='sig'>§</span> Sabine Frömling — Independent OT Security &amp; Compliance Advisory.",

 inv:(werk,datum,dauer,parts,mod)=>`Subject: Invitation — tabletop exercise, OT security incident — ${werk}, ${datum}

Dear colleagues,

On ${datum} we will run a ${dauer} tabletop exercise on an OT security incident (plant: ${werk}). A tabletop exercise simulates an incident at the table: you respond in your real role to situation pictures delivered by the facilitator — nothing is changed on real systems.

Participants: ${parts}.
Facilitator: ${mod}.

No preparation is required or desired; the scenario is deliberately not shared in advance. The exercise serves to improve our processes, not to assess individuals.

Please keep the slot free of parallel meetings — the exercise depends on uninterrupted attendance.

Thank you!`,

 de:{t:"Montag, 6:45 Uhr — Frühschicht",r:"Die Frühschicht startet in {WERK}. In der Leitwarte fallen mehrere HMIs nacheinander aus; auf einem Bildschirm erscheint eine Fehlermeldung mit unbekanntem Logo und englischem Text. {PROZ} sollen in 30 Minuten anlaufen. Der Schichtleiter ruft an: „Was sollen wir tun?\u201c",e:["Erstes Lagebild strukturieren: Was wissen wir, was vermuten wir?","OT-Vorfall-Triage anstoßen (drei Kriterien, Kap. 8.1.1)","Krisenstab alarmieren — wer ruft wen, nach welcher Liste?","Entscheidung zum Produktionsanlauf vertagen oder treffen — wer ist befugt?"],o:["Wird zwischen Wissen und Vermutung getrennt?","Existiert eine Alarmierungsliste — und ist sie aktuell?","Wer übernimmt erkennbar die Führung?"]},
 en:{t:"Monday, 6:45 — early shift",r:"The early shift starts at {WERK}. In the control room, several HMIs fail one after another; one screen shows an error message with an unknown logo and English text. {PROZ} are due to start in 30 minutes. The shift supervisor calls: \u201cWhat do we do?\u201d",e:["Structure the first situation picture: what do we know, what do we assume?","Start the OT incident triage (three criteria, ch. 15.8)","Alert the crisis team — who calls whom, from which list?","Postpone or take the production start decision — who has authority?"],o:["Is knowledge separated from assumption?","Does an alerting list exist — and is it current?","Who visibly takes the lead?"]}},
"Kompromittierter Fernwartungszugang (OEM)":{

 en:{t:"Tuesday, 14:10 — call from the SOC",r:"The SOC reports an active remote maintenance session on {CJ} at {WERK} — outside any announced maintenance window. When asked, the responsible OEM denies being connected. The session continues.",e:["Situation picture: legitimate session, stolen credentials or false alarm?","Pull up the remote maintenance register — who owns this access?","Observe vs. disconnect: start the first containment discussion","Activate the OEM escalation contact (not the hotline)"],o:["Is the remote maintenance register findable and current?","Is the session documented (evidence) instead of cut in panic?","Does anyone know the OEM's contractual security contact?"]}},
"Phishing auf Engineering-Workstation":{

 en:{t:"Wednesday, 9:20 — report from the shop floor",r:"A maintenance technician at {WERK} reports: on the engineering workstation next to {CJ}, a black window briefly opened after opening a supposed vendor newsletter. Since then \u201cthe machine feels sluggish\u201d. The EWS holds project files for {PROZ} and has internet access.",e:["Take the report seriously and praise it (reporting culture, ch. 6.3)","Triage: EWS = ISA-95 level affected → OT incident process","Stop using the EWS but do not power it off (forensics, volatile data)","Check: which connections does the EWS have to controllers?"],o:["Is the reporter treated as an early-warning system — or as a culprit?","Does anyone know whether the EWS is a documented asset with an owner?","Does the \u201cswitch it off\u201d reflex appear — and does anyone push back?"]}},

 en:{t:"Thursday, 11:05 — finding during a walk-through",r:"During a walk-through at {WERK}, an unknown device with a cellular antenna is found in the cabinet near {CJ}. Nobody present recognises it; a sticker names a service company nobody can place. It is blinking.",e:["Do not touch, do not unplug — photograph, document, mark the area","Triage: unauthorised component in the OT network = security cause cannot be ruled out","Clarify: maintenance contract? Historically grown? Who should have known?","Check on the network side (passively!): is the device communicating, and where to?"],o:["Does anyone reflexively reach for the plug?","Is \u201cunknown\u201d cleanly distinguished from \u201cmalicious\u201d?","Does a process for shadow-OT findings exist (ch. 12.4)?"]}},

"Ransomware aus der Office-IT":{
 de:{t:"Eskalation — Ausbreitung sichtbar",r:"Die IT meldet: Auch im Office-Netz sind mehrere Server nicht mehr erreichbar; eine erste Sichtung deutet auf Verschlüsselung hin. Ein Bediener erinnert sich, dass am Wochenende ein OEM-Techniker Updates eingespielt hat. Gleichzeitig trifft bei der Geschäftsführung eine E-Mail mit Lösegeldforderung ein.",e:["Triage formal abschließen: OT-Vorfall — ja (Beweislast-Umkehr)","Hypothesen trennen: OEM-Update (Spur? Zufall?) vs. Office-Ausbreitung","Verbindungen Office↔OT identifizieren: Was muss JETZT kontrolliert getrennt werden — und was nicht ({CJ}!)","Lösegeld-Mail: nicht antworten, sichern, Zuständigkeit (Recht/GF) klären"],o:["Wird die OEM-Spur sauber als Hypothese geführt — oder vorverurteilt?","Kennt jemand die tatsächlichen Office-OT-Übergänge?","Beginnt eine dokumentierte Zeitleiste?"]},
 en:{t:"Escalation — spread becomes visible",r:"IT reports: several office servers are no longer reachable; a first look suggests encryption. An operator remembers that an OEM technician installed updates over the weekend. At the same time, executive management receives an email with a ransom demand.",e:["Formally conclude the triage: OT incident — yes (reversed burden of proof)","Separate hypotheses: OEM update (lead? coincidence?) vs. office spread","Identify office↔OT connections: what must be disconnected in a controlled way NOW — and what must not ({CJ}!)","Ransom email: do not reply, preserve, clarify ownership (legal/management)"],o:["Is the OEM lead handled cleanly as a hypothesis — or prejudged?","Does anyone know the actual office–OT transitions?","Does a documented timeline begin?"]}},
"Kompromittierter Fernwartungszugang (OEM)":{
 de:{t:"Eskalation — die Sitzung handelt",r:"Das SOC beobachtet in der laufenden Sitzung Befehle Richtung {CJ}: Konfigurations-Lesezugriffe, dann ein Schreibversuch. Der echte OEM-Sicherheitskontakt bestätigt inzwischen: Die verwendeten Zugangsdaten wurden dem Techniker vor zwei Wochen per Phishing gestohlen.",e:["Lage neu bewerten: bestätigter Angreifer mit privilegiertem Zugang","Containment-Optionen sammeln, ohne sie schon auszuführen (→ nächste Karte)","Weitere Zugänge desselben OEM prüfen — auch in anderen Werken","Beweissicherung der Sitzungsaufzeichnung anordnen"],o:["Bleibt die Reihenfolge Beobachten → Bewerten → Entscheiden erhalten?","Denkt jemand an die anderen Werke / Zugänge?","Wird die Recording-Aufbewahrung sofort gesichert?"]},
 en:{t:"Escalation — the session acts",r:"The SOC observes commands towards {CJ} in the running session: configuration reads, then a write attempt. Meanwhile, the real OEM security contact confirms: the credentials in use were phished from the technician two weeks ago.",e:["Reassess: confirmed attacker with privileged access","Collect containment options without executing them yet (→ next card)","Check further access paths of the same OEM — including other plants","Order preservation of the session recording"],o:["Does the sequence observe → assess → decide hold?","Does anyone think of the other plants / access paths?","Is recording retention secured immediately?"]}},
"Phishing auf Engineering-Workstation":{
 de:{t:"Eskalation — Bewegung im Netz",r:"Das SOC findet von der EWS ausgehende Anmeldeversuche an zwei Steuerungen und am Domänencontroller des OT-Segments. Einer der Versuche an {CJ} war erfolgreich — mit einem Service-Konto, dessen Passwort seit Jahren unverändert ist.",e:["Lage: Lateral Movement bestätigt, privilegiertes Konto kompromittiert","Service-Konto-Frage: Sperren? Was bricht dann an {CJ}? (→ Containment-Karte)","DC-Kompromittierung als Worst-Case-Hypothese mitführen","Forensik-Dienstleister-Frage stellen: Wer, vertraglich, wie schnell?"],o:["Wird gefragt, was am Konto hängt, bevor jemand „sperren\u201c ruft?","Existiert ein IR-Retainer / benannter Forensik-Partner?","Wird die DC-Hypothese ernst genommen?"]},

"Schatten-OT-Gerät entdeckt":{

/* ================= State ================= */
let state={};
function initState(){state={werk:"",datum:todayISO(),mod:"",cj:"",parts:["Geschäftsführung / Krisenstab","SOC / IT-Security","OT-Leitung / Leitwarte","Werksleitung"],ans:{}};QUESTIONS.forEach(q=>state.ans[q.key]=q.opts[0]);}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(iso){if(!iso)return '';const p=String(iso).split('-');if(p.length!==3)return iso;return lang==="en"?p[0]+'-'+p[1]+'-'+p[2]:p[2]+'.'+p[1]+'.'+p[0];}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function werkName(){return (state.werk&&state.werk.trim())?state.werk.trim():L().werkPh;}
function cjName(){return (state.cj&&state.cj.trim())?state.cj.trim():(opt(state.ans.ziel)||L().cjPh);}
function modName(){return (state.mod&&state.mod.trim())?state.mod.trim():L().modPh;}
function fill(s){return s.split("{WERK}").join(esc(werkName())).split("{CJ}").join(esc(cjName())).split("{PROZ}").join(esc(SECT[state.ans.sektor][lang]));}

/* ================= i18n ================= */
function applyLang(){
  document.documentElement.lang=lang;
  document.title=L().title;
  document.querySelectorAll("[data-t]").forEach(el=>el.innerHTML=L()[el.dataset.t]);
  document.getElementById("werk").placeholder=L().phWerk;
  document.getElementById("mod").placeholder=L().phMod;
  document.getElementById("cj").placeholder=L().phCj;
  document.getElementById("lde").classList.toggle("on",lang==="de");
  document.getElementById("len").classList.toggle("on",lang==="en");
}
function setLang(l){lang=l;try{const u=new URL(location);u.searchParams.set('lang',l);history.replaceState(null,'',u);}catch(e){}applyLang();renderQuestions();renderOut();}

/* ================= Fragen ================= */
function renderQuestions(){
  const wrap=document.getElementById('questions');wrap.innerHTML='';
  QUESTIONS.forEach(q=>{
    const div=document.createElement('div');div.className='q';
    let h=`<div class="qt">${esc(L().q[q.key])}</div><div class="opts">`;
    q.opts.forEach(o=>{const sel=state.ans[q.key]===o?' sel':'';
      h+=`<span class="opt${sel}" onclick="setAns('${q.key}','${esc(o).replace(/'/g,"\\'")}')">${esc(opt(o))}</span>`;});
    h+=`</div>`;div.innerHTML=h;wrap.appendChild(div);
  });
  // Teilnehmer (Multi)
  const div=document.createElement('div');div.className='q';
  let h=`<div class="qt">${esc(L().lParts)}</div><div class="opts">`;
  PARTS.forEach(p=>{const sel=state.parts.includes(p)?' sel':'';
    h+=`<span class="opt${sel}" onclick="togglePart('${esc(p).replace(/'/g,"\\'")}')">${esc(opt(p))}</span>`;});
  h+=`</div>`;
  if(state.ans.ziel==="Sicherheitsgerichtetes System (SIS)" && !state.parts.includes("Process Safety Engineer")){
    h+=`<div class="kettewarn" style="margin-top:8px">⚠ ${esc(L().sisHint)}</div>`;
  }
  div.innerHTML=h;wrap.appendChild(div);
}
function setAns(k,v){state.ans[k]=v;renderQuestions();renderOut();}
function togglePart(p){const i=state.parts.indexOf(p);if(i>=0)state.parts.splice(i,1);else state.parts.push(p);renderQuestions();renderOut();}

/* ================= Ablauf-Engine =================
   Blöcke nach Kap. 8.4.1; Minutenbudget je Dauer.          */
function buildSchedule(){
  const dur=parseInt(state.ans.dauer);
  const useD=state.ans.melde==="BSI-Meldepflicht einspielen";
  const useE=state.ans.medien==="Medienanfrage einspielen";
  const useF=dur>=120;
  const injKeys=["A","B","C"].concat(useD?["D"]:[]).concat(useE?["E"]:[]).concat(useF?["F"]:[]);
  // Minuten je Inject-Diskussion
  const base={A:14,B:14,C:18,D:12,E:10,F:14};
  const brief= dur>=120?15:10, start=5, final=10, debrief= dur>=180?40:(dur>=120?25:18);
  let budget=dur-brief-start-final-debrief;
  let need=injKeys.reduce((s,k)=>s+base[k],0);
  // Skalieren auf Budget
  const scale=budget/need;
  const slots=injKeys.map(k=>({k,min:Math.max(8,Math.round(base[k]*scale))}));
  // Zeitachse
  const rows=[];let t=0;
  rows.push({t,blk:L().blkBrief,c:L().blkBriefC,min:brief});t+=brief;
  rows.push({t,blk:L().blkStart,c:L().blkStartC,min:start});t+=start;
  let sinceUpd=0,nr=0;
  slots.forEach((s,i)=>{
    nr++;
    rows.push({t,blk:`${L().blkPlay} ${nr}`,c:injTitle(s.k),min:s.min,inj:s.k});t+=s.min;sinceUpd+=s.min;
    if(sinceUpd>=22 && i<slots.length-1){rows.push({t,blk:L().blkUpd,c:L().blkUpdC,min:5});t+=5;sinceUpd=0;}
  });
  rows.push({t,blk:L().blkFinal,c:L().blkFinalC,min:final});t+=final;
  rows.push({t,blk:L().blkDebrief,c:L().blkDebriefC,min:debrief});t+=debrief;
  return {rows,injKeys,total:t};
}
function injData(k){
  if(k==="A")return INJ.A[state.ans.vektor][lang];
  if(k==="B")return INJ.B[state.ans.vektor][lang];
  if(k==="C")return INJ.C[state.ans.ziel][lang];
  return INJ[k][lang];
}
function injTitle(k){return injData(k).t;}

/* ================= Lernziele ================= */
function goals(){
  const g=[...L().goals.base];
  if(state.ans.melde==="BSI-Meldepflicht einspielen")g.push(L().goals.melde);
  if(state.ans.medien==="Medienanfrage einspielen")g.push(L().goals.medien);
  if(state.parts.includes("Geschäftsführung / Krisenstab")||state.parts.includes("Werksleitung"))g.push(L().goals.gf);
  if(state.ans.ziel==="Sicherheitsgerichtetes System (SIS)")g.push(L().goals.safety);
  if(parseInt(state.ans.dauer)>=120)g.push(L().goals.recover);
  return g;
}

/* ================= Rendering ================= */
function renderOut(){
  const T=L();
  const sch=buildSchedule();
  const datum=fmtDate(state.datum), dauer=opt(state.ans.dauer);
  document.getElementById('printHead').innerHTML=
    `<div class="headline"><span class="t">${T.printTitle}</span><span class="next">${esc(werkName())} · ${esc(datum)}</span></div>`;
  let h=`<div class="headline noprint"><span class="t">${esc(T.planTitle(werkName()))}</span><span class="next">${esc(opt(state.ans.vektor))} → ${esc(cjName())}</span></div>`;
  h+=`<div class="legalbox" style="margin-top:0"><b>${T.confidential}</b><br>${esc(T.metaRow(datum,dauer,modName()))} · ${T.vecLabel}: ${esc(opt(state.ans.vektor))} · ${esc(opt(state.ans.ziel))}${state.parts.length?` · ${state.parts.map(p=>esc(opt(p))).join(', ')}`:''}</div>`;

  // Lernziele + Spielregeln
  h+=section(T.goalsH,`<ul>${goals().map(g=>`<li>${g}</li>`).join('')}</ul>`);
  h+=section(T.rulesH,`<ul>${T.rules.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>`);

  // Ablaufplan
  h+=section(T.schedH,`<div class="audit"><table><thead><tr>${T.schedTh.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${
    sch.rows.map(r=>`<tr${r.inj?' style="font-weight:600"':''}><td style="white-space:nowrap">${T.tplus(r.t)}</td><td style="white-space:nowrap">${esc(r.blk)}</td><td>${esc(r.c)} <span style="color:var(--muted)">(${r.min} ${T.minutes})</span></td></tr>`).join('')
  }</tbody></table></div>`);

  // Inject-Karten
  let cards=`<div class="gap" style="margin-bottom:10px">${esc(T.triageNote)}</div>`;
  sch.injKeys.forEach((k,i)=>{
    const d=injData(k);
    const tAbs=sch.rows.find(r=>r.inj===k).t;
    cards+=`<div class="tmpl"><div class="tmplhead"><span>${i+1} · ${esc(d.t)} — ${T.tplus(tAbs)}</span></div>
      <div class="tmplbody">
      <div class="lbl" style="font-size:10px;letter-spacing:1px;color:var(--muted)">${T.injRead}</div>
      <pre style="white-space:pre-wrap">${fill(esc(d.r))}</pre>
      <div class="lbl" style="font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:8px">${T.injExp}</div>
      <ul>${d.e.map(x=>`<li>${fill(esc(x))}</li>`).join('')}</ul>
      <div class="lbl" style="font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:8px">${T.injObs}</div>
      <ul>${d.o.map(x=>`<li>${fill(esc(x))}</li>`).join('')}</ul>
      </div></div>`;
  });
  h+=section(T.injH,cards);

  // Beobachterbogen
  let obs=`<p class="note" style="margin-top:0">${esc(T.obsIntro)}</p>
  <div class="audit"><table><thead><tr>${T.obsTh.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${
    sch.injKeys.map((k,i)=>{const d=injData(k);return `<tr><td>${i+1}</td><td>${esc(d.t)}</td><td>${fill(esc(d.o[0]))}</td><td style="width:34px"></td><td style="width:34px"></td><td style="width:34px"></td><td style="width:24%"></td></tr>`;}).join('')
  }${T.obsKey.map(q=>`<tr><td>—</td><td style="color:var(--muted)">${esc(T.blkDebrief)}</td><td>${esc(q)}</td><td></td><td></td><td></td><td></td></tr>`).join('')}</tbody></table></div>`;
  h+=`<div id="obsheet">${section(T.obsH,obs)}</div>`;

  // Debrief + Lessons Learned + Audit
  h+=section(T.debH,`<ol>${T.deb.map(x=>`<li>${esc(x)}</li>`).join('')}</ol>`);
  h+=section(T.llH,`<div class="audit"><table><thead><tr>${T.llTh.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${
    T.llRows.map(r=>`<tr><td style="white-space:nowrap"><b>${r[0]}</b></td><td style="color:var(--muted)">${esc(r[1])}</td><td style="width:34%"></td></tr>`).join('')
  }</tbody></table></div>`);
  h+=section(T.auditH,`<div class="gap">${esc(T.auditBody)}</div>`);

  // Einladung
  h+=section(T.invH,`<p class="note" style="margin-top:0">${esc(T.invNote)}</p><pre id="inv" style="white-space:pre-wrap">${esc(inviteText())}</pre>`);

  document.getElementById('out').innerHTML=h;
}
function section(title,body){return `<div class="stage"><div class="stagehead"><span class="st">${title}</span></div><div class="stagebody">${body}</div></div>`;}
function inviteText(){
  const parts=state.parts.length?state.parts.map(p=>opt(p)).join(', '):L().emptyParts;
  return L().inv(werkName(),fmtDate(state.datum),opt(state.ans.dauer),parts,modName());
}

/* ================= Aktionen ================= */
function copyInvite(){
  const t=inviteText();
  const done=()=>{const b=document.getElementById('cinv');const o=L().binv;b.textContent=L().binvDone;setTimeout(()=>{b.textContent=o;},1400);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(()=>{fallbackCopy(t);done();});}
  else{fallbackCopy(t);done();}
}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}
function printObs(){
  document.body.classList.add('printobs');
  const off=()=>{document.body.classList.remove('printobs');window.removeEventListener('afterprint',off);};
  window.addEventListener('afterprint',off);
  window.print();
  setTimeout(off,1500);
}
function saveJSON(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ot-tabletop-uebung.json';a.click();}
function loadJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(d&&d.ans){state.werk=d.werk||"";state.datum=d.datum||todayISO();state.mod=d.mod||"";state.cj=d.cj||"";
      state.parts=Array.isArray(d.parts)?d.parts.filter(p=>PARTS.includes(p)):[];
      QUESTIONS.forEach(q=>state.ans[q.key]=q.opts.includes(d.ans[q.key])?d.ans[q.key]:q.opts[0]);
      syncFields();renderQuestions();renderOut();}
  }catch(err){alert(L().notRead);}};r.readAsText(f);e.target.value='';}
function syncFields(){[["werk","werk"],["datum","datum"],["mod","mod"],["cj","cj"]].forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.value=state[k]||'';});}

/* ================= Init ================= */
initState();
try{if(new URLSearchParams(location.search).get('lang')==='en')lang='en';}catch(e){}
syncFields();applyLang();renderQuestions();renderOut();
</script>
</body>
